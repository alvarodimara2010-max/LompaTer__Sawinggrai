<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Plongky Bros - Solo Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background-color: #001f3f;
            color: white;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            background: linear-gradient(to bottom, #001f3f, #003366);
            border: 6px solid #fff;
            image-rendering: pixelated;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .ui-overlay {
            position: absolute;
            background: #fff;
            padding: 25px;
            border: 4px solid #e74c3c;
            text-align: center;
            display: none;
            max-width: 450px;
            z-index: 100;
            color: #000;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #2c3e50;
            border: 4px solid #000;
            color: white;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .option-btn:hover {
            background: #e74c3c;
            transform: scale(1.02);
        }

        #game-info {
            position: absolute;
            top: 20px;
            width: 800px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .timer-warning {
            color: #ff4136;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-info">
        <div>SKOR: <span id="score-val">0</span></div>
        <div id="timer-container">WAKTU: <span id="timer-val">60</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="quiz-overlay" class="ui-overlay">
        <h2 class="text-[#e74c3c] mb-4 text-xs font-bold">POS KONSERVASI</h2>
        <p id="quiz-question" class="text-[11px] mb-6 leading-relaxed font-bold"></p>
        <div id="quiz-options"></div>
    </div>

    <div id="status-overlay" class="ui-overlay" style="display: block;">
        <h2 id="status-title" class="text-xl mb-4">MISI SOLO</h2>
        <p class="text-[9px] mb-6">Buka gerbang dengan ilmu pengetahuan dan temukan harta karun!</p>
        <button onclick="initGame()" class="option-btn" style="background:#2ecc71">MULAI</button>
    </div>

    <div class="mt-4 text-[8px] text-blue-300">Gunakan WASD atau Tombol Panah untuk bergerak</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const quizOverlay = document.getElementById('quiz-overlay');
        const statusOverlay = document.getElementById('status-overlay');
        const scoreVal = document.getElementById('score-val');
        const timerVal = document.getElementById('timer-val');

        canvas.width = 800;
        canvas.height = 440;

        let gameActive = false;
        let isQuizActive = false;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;

        const gravity = 0.6;
        const keys = {};

        const questions = [
            { q: "Apa dampak pemanasan global terhadap kutub?", a: ["Es mencair & laut naik", "Es makin tebal"], correct: 0 },
            { q: "Mengapa terumbu karang mati akibat limbah?", a: ["Air terlalu jernih", "Racun & kurang cahaya"], correct: 1 },
            { q: "Sumber polusi mikroplastik terbesar di laut?", a: ["Kayu hanyut", "Sampah kemasan & tekstil"], correct: 1 },
            { q: "Apa itu emisi karbon?", a: ["Gas rumah kaca dari bahan bakar", "Asap dari masak air"], correct: 0 },
            { q: "Cara mengurangi jejak karbon sehari-hari?", a: ["Naik transportasi umum", "Selalu pakai mobil pribadi"], correct: 0 }
        ];

        class Player {
            constructor(x, y) {
                this.startX = x;
                this.startY = y;
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 40;
                this.dx = 0;
                this.dy = 0;
                this.jumpStrength = -12.5;
                this.isGrounded = false;
                this.facingRight = true;
            }

            reset() {
                this.x = this.startX;
                this.y = this.startY;
                this.dx = 0;
                this.dy = 0;
            }

            draw() {
                // Gambar Karakter Manusia Sederhana (Pixel Art Style)
                ctx.save();
                
                // Kepala (Warna Kulit)
                ctx.fillStyle = "#ffdbac";
                ctx.fillRect(this.x + 4, this.y, 16, 16);
                
                // Rambut
                ctx.fillStyle = "#4b2c20";
                ctx.fillRect(this.x + 4, this.y, 16, 4);
                
                // Mata
                ctx.fillStyle = "black";
                let eyeOffset = this.facingRight ? 14 : 6;
                ctx.fillRect(this.x + eyeOffset, this.y + 6, 4, 4);

                // Badan (Baju)
                ctx.fillStyle = "#3498db";
                ctx.fillRect(this.x + 2, this.y + 16, 20, 14);

                // Tangan
                ctx.fillStyle = "#ffdbac";
                if (this.facingRight) {
                    ctx.fillRect(this.x - 2, this.y + 18, 6, 8); // Kiri
                    ctx.fillRect(this.x + 20, this.y + 18, 6, 8); // Kanan
                } else {
                    ctx.fillRect(this.x - 2, this.y + 18, 6, 8);
                    ctx.fillRect(this.x + 20, this.y + 18, 6, 8);
                }

                // Celana
                ctx.fillStyle = "#2c3e50";
                ctx.fillRect(this.x + 4, this.y + 30, 16, 10);
                
                // Sepatu
                ctx.fillStyle = "black";
                ctx.fillRect(this.x + 2, this.y + 36, 6, 4); // Kiri
                ctx.fillRect(this.x + 16, this.y + 36, 6, 4); // Kanan

                ctx.restore();
            }

            update(platforms, gates, enemies) {
                if (!gameActive || isQuizActive) return;

                if (keys['a'] || keys['arrowleft']) {
                    this.dx = -6;
                    this.facingRight = false;
                }
                else if (keys['d'] || keys['arrowright']) {
                    this.dx = 6;
                    this.facingRight = true;
                }
                else this.dx *= 0.8;

                if ((keys['w'] || keys['arrowup'] || keys[' ']) && this.isGrounded) {
                    this.dy = this.jumpStrength;
                    this.isGrounded = false;
                }

                this.dy += gravity;
                this.x += this.dx;
                this.y += this.dy;

                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y > canvas.height) this.reset();

                this.isGrounded = false;

                platforms.forEach(p => {
                    if (this.x < p.x + p.w && this.x + this.width > p.x &&
                        this.y + this.height > p.y && this.y < p.y + p.h) {
                        if (this.dy > 0 && this.y + this.height - this.dy <= p.y) {
                            this.y = p.y - this.height;
                            this.dy = 0;
                            this.isGrounded = true;
                            if (p.isMoving) this.x += p.dx;
                        }
                    }
                });

                gates.forEach(g => {
                    if (g.active && this.x < g.x + g.w && this.x + this.width > g.x &&
                        this.y + this.height > g.y && this.y < g.y + g.h) {
                        triggerQuiz(g);
                    }
                });

                enemies.forEach(e => {
                    if (this.x < e.x + e.w && this.x + this.width > e.x &&
                        this.y + this.height > e.y && this.y < e.y + e.h) {
                        this.reset();
                        timeLeft -= 2;
                    }
                });
            }
        }

        class Enemy {
            constructor(x, y, range, speed = 2.5) {
                this.x = x;
                this.startX = x;
                this.y = y;
                this.w = 32;
                this.h = 32;
                this.dx = speed;
                this.range = range;
            }
            update() {
                if (isQuizActive) return;
                this.x += this.dx;
                if (this.x > this.startX + this.range || this.x < this.startX) this.dx *= -1;
            }
            draw() {
                ctx.fillStyle = "#ff4136";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillStyle = "white";
                ctx.font = "14px Arial";
                ctx.fillText("😡", this.x + 4, this.y + 22);
            }
        }

        const p1 = new Player(40, 300);
        let platforms = [];
        let gates = [];
        let enemies = [];
        let treasure = { x: 740, y: 300, w: 40, h: 40 };

        function setupLevel() {
            platforms = [
                { x: 0, y: 380, w: 220, h: 60 },
                { x: 300, y: 300, w: 100, h: 20 },
                { x: 450, y: 380, w: 150, h: 60 },
                { x: 200, y: 200, w: 80, h: 20, isMoving: true, dx: 3, startX: 180, range: 250 },
                { x: 500, y: 120, w: 100, h: 20, isMoving: true, dx: -2.5, startX: 350, range: 250 },
                { x: 680, y: 340, w: 120, h: 100 },
                { x: 650, y: 220, w: 80, h: 20 }
            ];
            gates = [
                { x: 340, y: 150, w: 30, h: 150, active: true },
                { x: 600, y: 40, w: 30, h: 150, active: true }
            ];
            enemies = [
                new Enemy(460, 350, 120, 3),
                new Enemy(310, 270, 80, 2)
            ];
        }

        function initGame() {
            statusOverlay.style.display = 'none';
            setupLevel();
            p1.reset();
            score = 0; scoreVal.innerText = score;
            timeLeft = 60;
            timerVal.innerText = timeLeft;
            gameActive = true;
            document.getElementById('timer-container').classList.remove('timer-warning');
            
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isQuizActive && gameActive) {
                    timeLeft--;
                    timerVal.innerText = timeLeft;
                    if(timeLeft <= 10) document.getElementById('timer-container').classList.add('timer-warning');
                    if(timeLeft <= 0) gameOver("WAKTU HABIS!");
                }
            }, 1000);
            loop();
        }

        function triggerQuiz(gate) {
            isQuizActive = true;
            const q = questions[Math.floor(Math.random() * questions.length)];
            quizOverlay.style.display = 'block';
            document.getElementById('quiz-question').innerText = q.q;
            const options = document.getElementById('quiz-options');
            options.innerHTML = '';
            q.a.forEach((ans, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = ans;
                btn.onclick = () => {
                    if (i === q.correct) {
                        isQuizActive = false;
                        gate.active = false;
                        score += 500; scoreVal.innerText = score;
                        quizOverlay.style.display = 'none';
                    } else {
                        gameOver("JAWABAN SALAH!");
                    }
                };
                options.appendChild(btn);
            });
        }

        function gameOver(reason) {
            gameActive = false;
            clearInterval(timerInterval);
            statusOverlay.style.display = 'block';
            document.getElementById('status-title').innerText = reason;
            quizOverlay.style.display = 'none';
        }

        function update() {
            p1.update(platforms, gates, enemies);
            enemies.forEach(e => e.update());
            platforms.forEach(p => {
                if(p.isMoving) {
                    p.x += p.dx;
                    if(p.x > p.startX + p.range || p.x < p.startX) p.dx *= -1;
                }
            });

            if (!gates[1].active && 
                p1.x < treasure.x + treasure.w && 
                p1.x + p1.width > treasure.x &&
                p1.y < treasure.y + treasure.h &&
                p1.y + p1.height > treasure.y) {
                gameActive = false;
                clearInterval(timerInterval);
                statusOverlay.style.display = 'block';
                document.getElementById('status-title').innerText = "HARTA DITEMUKAN!";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            platforms.forEach(p => {
                ctx.fillStyle = p.isMoving ? "#2980b9" : "#2c3e50";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            gates.forEach(g => {
                if(g.active) {
                    ctx.fillStyle = "#f1c40f";
                    ctx.fillRect(g.x, g.y, g.w, g.h);
                    ctx.fillStyle = "#000";
                    ctx.font = "16px Arial";
                    ctx.fillText("?", g.x + 8, g.y + 30);
                }
            });

            ctx.fillStyle = "#8b4513";
            ctx.fillRect(treasure.x, treasure.y, treasure.w, treasure.h);
            ctx.fillStyle = "#ffd700";
            ctx.fillRect(treasure.x, treasure.y + 15, treasure.w, 5);
            ctx.font = "10px Arial";
            ctx.fillText("💰", treasure.x + 10, treasure.y + 28);
            
            enemies.forEach(e => e.draw());
            p1.draw();
        }

        function loop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    </script>
</body>
</html>
